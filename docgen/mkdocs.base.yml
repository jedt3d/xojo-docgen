# MkDocs base configuration — shared by every per-project site via INHERIT:.
# Per-project mkdocs.yml files (generated by xojo-docgen into docs/api/<slug>/)
# inherit everything here and only override site_name, docs_dir, site_dir.
#
# Do not edit per-project values here; edit this file for brand-wide changes.

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  font:
    text: Roboto
    code: JetBrains Mono
  icon:
    logo: material/book-open-page-variant
  palette:
    # Xojo green — light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Xojo green — dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/prism.js
  - javascripts/xojo.prism.js
  - javascripts/source-modal.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY.md
      implicit_index: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://www.xojo.com/
      name: Xojo
