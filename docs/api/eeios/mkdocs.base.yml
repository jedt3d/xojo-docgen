theme:
  name: null
  custom_dir: overrides

hooks:
  - hooks/editorial.py

exclude_docs: |
  hooks/
  overrides/
  mkdocs.base.yml
  mkdocs.yml

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: false

plugins:
  - literate-nav:
      nav_file: SUMMARY.md
      implicit_index: true
